name: Generate Markdown

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  generate-markdown:
    name: Generate Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Compile project
        run: mvn -q -e compile
      - name: Print Markdown file
        run: mvn -q -e -DskipTests exec:java -Dexec.mainClass="org.example.Main" > docs/skills.md
      - name: cat docs/skills.md
        run: cat docs/skills.md